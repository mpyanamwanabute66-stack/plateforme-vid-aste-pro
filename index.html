<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéaste Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#fff;
  min-height:100vh;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
  color:#38bdf8;
  font-size:20px;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h2{
  font-size:28px;
}

.hero p{
  color:#94a3b8;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:rgba(56,189,248,0.1);
  box-shadow:0 0 15px rgba(56,189,248,0.3);
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<header>
<h1>🎬 Vidéaste Pro+</h1>
</header>

<section class="hero">
<h2>Plateforme Vidéaste Moderne</h2>
<p>Services professionnels de création vidéo</p>
</section>

<section class="grid" id="grid"></section>

<script>
const grid = document.getElementById("grid");

fetch("./data.json")
.then(res => res.json())
.then(data => {
  data.forEach(item => {
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${item.titre}</h3>
      <p style="color:#94a3b8;font-size:13px;margin-top:8px;">
        ${item.description}
      </p>
      <button onclick="alert('Ouverture du service')">
        Voir
      </button>
    `;

    grid.appendChild(card);
  });
})
.catch(err => {
  grid.innerHTML = "<p>Erreur de chargement des données</p>";
});
</script>

</body>
</html>
