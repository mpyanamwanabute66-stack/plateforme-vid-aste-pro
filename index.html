<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéaste Pro+ Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#0f172a;color:#fff;margin:0}
header{display:flex;justify-content:space-between;padding:20px;background:#020617}
button{padding:10px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:10px}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center}
.modal-content{background:#1e293b;padding:20px;border-radius:10px}
.modal input{display:block;margin:10px 0;padding:10px;width:100%}
#userInfo{padding:10px;color:#38bdf8}
</style>
</head>

<body>

<header>
<h1>Vidéaste Pro+</h1>
<div>
<button onclick="openModal('login')">Connexion</button>
<button onclick="openModal('register')">Créer compte</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">Déconnexion</button>
</div>
</header>

<p id="userInfo">Non connecté</p>

<section>
<h2 style="padding:20px">🎬 Fonctionnalités</h2>
<div class="grid" id="features"></div>
</section>

<!-- LOGIN -->
<div id="login" class="modal">
<div class="modal-content">
<h3>Connexion</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="modal">
<div class="modal-content">
<h3>Créer un compte</h3>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPassword" placeholder="Mot de passe">
<button onclick="register()">Créer</button>
</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD1-1zaS327uB4nEOScf3l9hoUBY_lxtbU",
  authDomain: "plateforme-vid.firebaseapp.com",
  projectId: "plateforme-vid",
  storageBucket: "plateforme-vid.firebasestorage.app",
  messagingSenderId: "868404531064",
  appId: "1:868404531064:web:f493a4b70a099a9c54c28d",
  measurementId: "G-VYZ8JGSN77"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// état utilisateur
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('userInfo').innerText = "Connecté : " + user.email;
    document.getElementById('logoutBtn').style.display = "inline-block";
  } else {
    document.getElementById('userInfo').innerText = "Non connecté";
    document.getElementById('logoutBtn').style.display = "none";
  }
});

// REGISTER
function register(){
  let email=document.getElementById('regEmail').value;
  let password=document.getElementById('regPassword').value;

  if(!email || !password){
    alert("Remplis tous les champs");
    return;
  }

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>{
    alert('Compte créé');
    closeModal();
  })
  .catch(err=>alert(err.message));
}

// LOGIN
function login(){
  let email=document.getElementById('loginEmail').value;
  let password=document.getElementById('loginPassword').value;

  if(!email || !password){
    alert("Remplis tous les champs");
    return;
  }

  auth.signInWithEmailAndPassword(email,password)
  .then(()=>{
    alert('Connecté');
    closeModal();
  })
  .catch(err=>alert(err.message));
}

// LOGOUT
function logout(){
  auth.signOut();
  alert('Déconnecté');
}

// MODALS
function openModal(id){
  document.getElementById(id).style.display='flex';
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m=>{
    m.style.display='none';
  });
}

window.onclick=e=>{
  document.querySelectorAll('.modal').forEach(m=>{
    if(e.target==m) m.style.display='none';
  });
}

// 200 blocs améliorés
let container=document.getElementById('features');
for(let i=1;i<=200;i++){
  let div=document.createElement('div');
  div.className='card';
  div.innerHTML = `
    <h3>Fonction ${i}</h3>
    <p>Service vidéaste professionnel</p>
    <button onclick="alert('Bientôt disponible')">Voir</button>
  `;
  container.appendChild(div);
}
</script>

</body>
</html>
