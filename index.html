<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéaste Pro+ Firebase</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<style>
body{font-family:Poppins;background:#0f172a;color:#fff;margin:0}
header{display:flex;justify-content:space-between;padding:20px;background:#020617}
button{padding:10px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:10px}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center}
.modal-content{background:#1e293b;padding:20px;border-radius:10px}
.modal input{display:block;margin:10px 0;padding:10px;width:100%}
</style>
</head>
<body>
<header>
<h1>Vidéaste Pro+</h1>
<div>
<button onclick="openModal('login')">Connexion</button>
<button onclick="openModal('register')">Créer compte</button>
<button onclick="logout()">Déconnexion</button>
</div>
</header><section>
<h2 style="padding:20px">🎬 Fonctionnalités</h2>
<div class="grid" id="features"></div>
</section><div id="login" class="modal">
<div class="modal-content">
<h3>Connexion</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
</div>
</div><div id="register" class="modal">
<div class="modal-content">
<h3>Créer un compte</h3>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPassword" placeholder="Mot de passe">
<button onclick="register()">Créer</button>
</div>
</div><script>
// Firebase config (REMPLACE avec ton config Firebase)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function register(){
 let email=document.getElementById('regEmail').value;
 let password=document.getElementById('regPassword').value;
 auth.createUserWithEmailAndPassword(email,password)
 .then(()=>alert('Compte créé'))
 .catch(err=>alert(err.message));
}

function login(){
 let email=document.getElementById('loginEmail').value;
 let password=document.getElementById('loginPassword').value;
 auth.signInWithEmailAndPassword(email,password)
 .then(()=>alert('Connecté'))
 .catch(err=>alert(err.message));
}

function logout(){
 auth.signOut();
 alert('Déconnecté');
}

function openModal(id){document.getElementById(id).style.display='flex'}
window.onclick=e=>{document.querySelectorAll('.modal').forEach(m=>{if(e.target==m)m.style.display='none'})}

// Générer 200 blocs
let container=document.getElementById('features');
for(let i=1;i<=200;i++){
 let div=document.createElement('div');
 div.className='card';
 div.innerText='Fonction '+i;
 container.appendChild(div);
}
</script></body>
</html>
