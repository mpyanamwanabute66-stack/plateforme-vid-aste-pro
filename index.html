<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéaste Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#fff;
  min-height:100vh;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
  font-size:20px;
  color:#38bdf8;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h2{
  font-size:28px;
  margin-bottom:10px;
}

.hero p{
  color:#94a3b8;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:0.3s;
  backdrop-filter:blur(10px);
  animation:fadeIn 0.5s ease-in-out;
}

.card:hover{
  transform:translateY(-5px);
  background:rgba(56,189,248,0.1);
  box-shadow:0 0 20px rgba(56,189,248,0.3);
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#64748b;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🎬 Vidéaste Pro+</h1>
<button onclick="alert('Mode démo actif')">Menu</button>
</header>

<section class="hero">
<h2>Plateforme Vidéaste Moderne</h2>
<p>Création, montage, services et outils professionnels</p>
</section>

<section class="grid" id="grid"></section>

<footer>
© 2026 Vidéaste Pro+ | Version moderne sans backend
</footer>

<const grid = document.getElementById("grid");

for (let i = 1; i <= 200; i++) {
  let card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h3>Service ${i}</h3>
    <p style="color:#94a3b8;font-size:13px;margin-top:5px;">
      Outil professionnel de création vidéo
    </p>
    <button style="margin-top:10px;" onclick="alert('Service ${i} bientôt disponible 🚀')">
      Ouvrir
    </button>
  `;

  grid.appendChild(card);
}

</body>
</html>
